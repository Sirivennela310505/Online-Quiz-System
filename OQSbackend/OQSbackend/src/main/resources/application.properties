spring.application.name=OQSbackend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_quiz_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:siri3105}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=${SERVER_PORT:8080}

# App Configuration
app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-before-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
